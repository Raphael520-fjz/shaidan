 [

// =====================================================================
// 初始化
// =====================================================================
const DISTRICTS = ['浦东新区','黄浦区','徐汇区','长宁区','静安区','普陀区','虹口区','杨浦区','闵行区','宝山区','嘉定区','金山区','松江区','青浦区','奉贤区','崇明区','线上'];
const GRADES = ['幼小衔接','小学一年级','小学二年级','小学三年级','小学四年级','小学五年级','小学六年级','初一','初二','初三','高一','高二','高三','初中','大学','成人'];
const SUBJECTS = ['语文','数学','英语','物理','化学','生物','地理','历史','政治','全科','奥数','文科','数理化','语数英','小提琴','琵琶','钢琴','美术','书法','编程','日语','音乐','体育','乐器','其他'];

let orders = ORDER_DATA.map((d, i) => ({
  id: i,
  district: d[0],
  grade: d[1],
  subject: d[2],
  detail: d[3]
}));

// 去重
let seen = new Set();
orders = orders.filter(o => {
  const key = `${o.district}|${o.grade}|${o.subject}|${o.detail.slice(0,50)}`;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

function initFilters() {
  const dSet = new Set(), gSet = new Set(), sSet = new Set();
  orders.forEach(o => { dSet.add(o.district); gSet.add(o.grade); sSet.add(o.subject); });

  const dSel = document.getElementById('fDistrict');
  DISTRICTS.forEach(d => { if (dSet.has(d)) { const opt = document.createElement('option'); opt.value = d; opt.textContent = d; dSel.appendChild(opt); }});

  const gSel = document.getElementById('fGrade');
  GRADES.forEach(g => { if (gSet.has(g)) { const opt = document.createElement('option'); opt.value = g; opt.textContent = g; gSel.appendChild(opt); }});

  const sSel = document.getElementById('fSubject');
  SUBJECTS.forEach(s => { if (sSet.has(s)) { const opt = document.createElement('option'); opt.value = s; opt.textContent = s; sSel.appendChild(opt); }});
}

function getFiltered() {
  const fd = document.getElementById('fDistrict').value;
  const fg = document.getElementById('fGrade').value;
  const fs = document.getElementById('fSubject').value;
  return orders.filter(o => (!fd||o.district===fd) && (!fg||o.grade===fg) && (!fs||o.subject===fs));
}

function render() {
  const filtered = getFiltered();
  document.getElementById('visCount').textContent = filtered.length;
  document.getElementById('totalCount').textContent = orders.length;
  document.getElementById('navTotal').textContent = orders.length;

  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr class="empty-state"><td colspan="7"><div style="font-size:40px;margin-bottom:8px">📭</div><p>没有匹配的筛选结果</p></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map((o, i) =>
    `<tr>
      <td><span class="date-tag">6.3日单</span></td>
      <td>${i+1}</td>
      <td>${o.district}</td>
      <td>${o.grade}</td>
      <td>${o.subject}</td>
      <td>${escHtml(o.detail)}</td>
      <td><button class="copy-btn" onclick="copyOne(this,'${escAttr(o)}')">复制</button></td>
    </tr>`
  ).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(o) { return encodeURIComponent(JSON.stringify({d:o.district,g:o.grade,s:o.subject,dt:o.detail})); }

function copyOne(btn, encoded) {
  const o = JSON.parse(decodeURIComponent(encoded));
  const text = `【6.3日单】${o.d} · ${o.g} · ${o.s}\n${o.dt}`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text);
  } else {
    const t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
  }
  btn.textContent='已复制'; btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='复制'; btn.classList.remove('copied');},1500);
  showToast('✅ 已复制到剪贴板');
}

function copyAll() {
  const filtered = getFiltered();
  if (!filtered.length) { showToast('⚠️ 当前没有可复制的内容'); return; }
  const text = filtered.map((o,i) => `【6.3日单·${i+1}】${o.district} · ${o.grade} · ${o.subject}\n${o.detail}`).join('\n\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text);
  } else {
    const t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
  }
  showToast(`✅ 已复制 ${filtered.length} 条单子到剪贴板`);
}

function resetFilters() {
  document.getElementById('fDistrict').value = '';
  document.getElementById('fGrade').value = '';
  document.getElementById('fSubject').value = '';
  render();
}

function togglePaste() {
  const box = document.getElementById('pasteBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function detectDistrict(text) {
  for (const d of DISTRICTS) if (text.includes(d)) return d;
  const m = text.match(/(?:地址|上课地址|辅导地点|联系地址|学员地址|地点|位置)[：:\s]*[#]?([^\s，,\n]+)/);
  if (m) for (const d of DISTRICTS) if (m[1] && (m[1].includes(d) || d.includes(m[1]))) return d;
  return '待识别';
}

function detectGrade(text) {
  const patterns = [
    [/四岁半|四岁|五岁|六岁|三岁|2岁半|中班|大班|幼儿园|幼小衔接|学前|启蒙|宝宝/, '幼小衔接'],
    [/一年级|1年级|一升二|幼升小/, '小学一年级'],
    [/二年级|2年级|二升三/, '小学二年级'],
    [/三年级|3年级|三升四/, '小学三年级'],
    [/四年级|4年级|四升五|新4/, '小学四年级'],
    [/五年级|5年级|五升六/, '小学五年级'],
    [/六年级|6年级|预初|六升七|小升初|g6|G6/, '小学六年级'],
    [/初一|七年级|7年级|七升八/, '初一'],
    [/初二|八年级|8年级|八升九|g8|G8/, '初二'],
    [/初三|九年级|9年级|升初三|初升高/, '初三'],
    [/高一|10年级|升高一|高一升高二|准高二/, '高一'],
    [/高二|11年级|升高二|准高三|新高三|升高三/, '高二'],
    [/高三|12年级|高考/, '高三'],
    [/成人/, '成人'],
  ];
  for (const [re, g] of patterns) if (re.test(text)) return g;
  return '待识别';
}

function detectSubject(text) {
  const s = text.toLowerCase();
  if (s.includes('奥数') || s.includes('浅奥') || s.includes('amc') || s.includes('逻辑思维')) return '奥数';
  if (s.includes('数理化')) return '数理化';
  if (s.includes('语数英') || s.includes('语数外')) return '语数英';
  if (s.includes('全科') || s.includes('陪读') || s.includes('作辅') || s.includes('作业辅导') || s.includes('陪伴') || s.includes('陪学') || s.includes('陪玩')) return '全科';
  if (s.includes('雅思') || s.includes('助教')) return '英语';
  if (s.includes('小提琴') || s.includes('钢琴') || s.includes('古筝') || s.includes('琵琶') || s.includes('单簧管') || s.includes('尤克里里') || s.includes('声乐') || s.includes('乐器') || s.includes('书法') || s.includes('绘画')) return '乐器';
  if (s.includes('日语')) return '日语';
  if (s.includes('编程')) return '编程';
  if (s.includes('游泳') || s.includes('网球') || s.includes('户外') || s.includes('体育')) return '体育';
  if (s.includes('ket') || s.includes('pet') || s.includes('fce') || s.includes('小托福') || s.includes('口语') || s.includes('英文') || s.includes('英语') || s.includes('启蒙')) return '英语';
  if (s.includes('语文') || s.includes('拼音') || s.includes('作文') || s.includes('阅读')) return '语文';
  if (s.includes('数学')) return '数学';
  if (s.includes('物理')) return '物理';
  if (s.includes('化学')) return '化学';
  if (s.includes('生物')) return '生物';
  if (s.includes('地理')) return '地理';
  if (s.includes('历史')) return '历史';
  if (s.includes('政治')) return '政治';
  return '其他';
}

function parseAndAdd() {
  const raw = document.getElementById('rawInput').value.trim();
  if (!raw) { showToast('⚠️ 请先粘贴单子内容'); return; }

  // Split into blocks by blank lines
  const blocks = raw.split(/\n\s*\n/).filter(b => b.trim());
  let added = 0, skipped = 0;

  for (const block of blocks) {
    const text = block.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
    if (text.length < 15) continue;

    const district = detectDistrict(text);
    const grade = detectGrade(text);
    const subject = detectSubject(text);

    if (district === '待识别' && grade === '待识别') continue;

    const key = `${district}|${grade}|${subject}|${text.slice(0,60)}`;
    if (!seen.has(key)) {
      seen.add(key);
      orders.push({ id: orders.length, district, grade, subject, detail: text });
      added++;
    } else { skipped++; }
  }

  document.getElementById('rawInput').value = '';
  initFilters();
  render();
  showToast(`✅ 添加 ${added} 条，跳过重复 ${skipped} 条`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), 2000);
}

// 启动
initFilters();
render();
</script>
